<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resources for Supporting Women-Led Businesses</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #f5f7fa;
    color: #1a1a2e;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    background: #002244;
    color: #ffffff;
    padding: 24px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }

  .header-text h1 {
    font-size: 1.25rem;
    font-weight: 600;
    letter-spacing: -0.01em;
    line-height: 1.4;
  }

  .header-text p {
    font-size: 0.85rem;
    color: #a8c4e0;
    margin-top: 4px;
  }

  .download-btn {
    background: #ffffff;
    color: #002244;
    text-decoration: none;
    padding: 10px 20px;
    border-radius: 6px;
    font-size: 0.85rem;
    font-weight: 600;
    transition: background 0.2s;
    white-space: nowrap;
  }

  .download-btn:hover {
    background: #e0e8f0;
  }

  .pdf-container {
    flex: 1;
    display: flex;
    justify-content: center;
    padding: 24px;
  }

  .pdf-container iframe {
    width: 100%;
    max-width: 900px;
    height: 80vh;
    border: 1px solid #dde3eb;
    border-radius: 8px;
    background: #fff;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  }

  /* Fallback for environments that block iframes */
  .fallback {
    display: none;
    text-align: center;
    padding: 60px 24px;
    max-width: 600px;
    margin: 0 auto;
  }

  .fallback p {
    font-size: 1rem;
    color: #4a5568;
    margin-bottom: 20px;
    line-height: 1.6;
  }

  .fallback .download-btn {
    display: inline-block;
    background: #002244;
    color: #fff;
    padding: 14px 28px;
    border-radius: 6px;
    font-size: 1rem;
  }

  footer {
    text-align: center;
    padding: 16px;
    font-size: 0.75rem;
    color: #8896a6;
    border-top: 1px solid #e2e8f0;
  }

  @media (max-width: 600px) {
    header { padding: 16px; }
    .header-text h1 { font-size: 1.05rem; }
    .pdf-container { padding: 12px; }
    .pdf-container iframe { height: 70vh; }
  }
</style>
<!-- Google Analytics — replace 208893702 with your actual ID -->
<script async src="https://www.googletagmanager.com/gtag/js?id=208893702"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', '208893702');
</script>
</head>
<body>

<header>
  <div class="header-text">
    <h1>Resources for Supporting Women-Led Businesses</h1>
    <p>Evidence-Based Training Resources</p>
  </div>
  <a class="download-btn" href="resources.pdf" download>⬇ Download PDF</a>
</header>

<div class="pdf-container">
  <iframe src="resources.pdf" title="Resources for Supporting Women-Led Businesses"></iframe>
</div>

<div class="fallback" id="fallback">
  <p>Your browser or network may not support inline PDF viewing. You can download the document directly below.</p>
  <a class="download-btn" href="resources.pdf" download>⬇ Download PDF</a>
</div>

<footer>
  &copy; 2026 · Resources for Supporting Women-Led Businesses
</footer>

<script>
  // Show fallback if iframe fails to load
  const iframe = document.querySelector('iframe');
  iframe.addEventListener('error', function() {
    document.querySelector('.pdf-container').style.display = 'none';
    document.getElementById('fallback').style.display = 'block';
  });
</script>

</body>
</html>
